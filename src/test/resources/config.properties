# ============================================================
# Configuración del Framework de Automation - SauceDemo
# Estos valores pueden ser sobreescritos por variables de entorno.
# Convención: base.url → env var BASE_URL, headless → HEADLESS, etc.
# ============================================================

# URL base de SauceDemo
base.url=https://www.saucedemo.com

# Credenciales válidas
valid.username=standard_user
valid.password=secret_sauce

# Credenciales inválidas (para pruebas negativas)
invalid.username=wrong_user
invalid.password=wrong_password

# Credenciales - usuario bloqueado
locked.username=locked_out_user
locked.password=secret_sauce

# Configuración del browser
# headless=false localmente. En CI (GitHub Actions) se activa automáticamente
# al detectar la variable de entorno CI=true, sin necesidad de cambiarlo aquí.
browser=chrome
headless=false

# Timeouts (en segundos)
# implicit.wait=0 → NO usar implicit wait; interfiere con explicit waits generando esperas dobles.
# explicit.wait  → tiempo máximo para WebDriverWait (esperas explícitas en BasePage).
# page.load.timeout → tiempo máximo para que cargue la página completa.
implicit.wait=0
explicit.wait=20
page.load.timeout=45
