name: Selenium Tests - SauceDemo

# Corre en cada push y pull request a main/master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # También permite ejecutarlo manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  test:
    name: Run Selenium Tests (Headless)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 3. Google Chrome está preinstalado en ubuntu-latest.
      #    Este paso asegura que tenemos la versión más reciente y muestra la versión.
      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome

      # 4. Ejecutar los tests con Maven
      #    CI=true → BaseTest detecta el entorno y activa headless automáticamente.
      #    No hace falta poner HEADLESS=true explícitamente.
      - name: Run TestNG tests
        env:
          CI: "true"
        run: mvn test --no-transfer-progress

      # 5. Publicar el reporte de TestNG como artefacto descargable
      #    Siempre se ejecuta, incluso si los tests fallaron (always()).
      - name: Upload TestNG report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testng-report
          path: target/surefire-reports/
          retention-days: 7
